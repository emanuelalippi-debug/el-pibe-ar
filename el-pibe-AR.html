<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Pibe que Ataja el Tiempo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Georgia', serif;
    width: 100vw;
    height: 100vh;
  }

  #video-camara {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #canvas-detect { display: none; }

  #video-experience {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.8s ease;
    background: transparent;
    mix-blend-mode: screen;
  }

  #video-experience.visible { opacity: 1; }

  #status {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 10;
    transition: opacity 0.5s;
    text-align: center;
    pointer-events: none;
  }

  #detector-indicator {
    position: fixed;
    top: 20px; right: 20px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    z-index: 10;
    transition: background 0.3s;
  }

  #detector-indicator.active {
    background: #ff3333;
    box-shadow: 0 0 12px #ff3333;
  }

  #start-btn {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 18px 40px;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 20;
    font-family: 'Georgia', serif;
  }

  #instruccion {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  #pulse-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 80px; height: 80px;
    border: 3px solid rgba(255,60,60,0.8);
    border-radius: 50%;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.6s ease-out, opacity 0.6s ease-out;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<video id="video-camara" autoplay playsinline muted></video>
<canvas id="canvas-detect"></canvas>

<video id="video-experience" playsinline>
  <source src="pibe.mp4" type="video/mp4">
</video>

<div id="detector-indicator"></div>
<div id="pulse-ring"></div>
<button id="start-btn">Iniciar experiencia</button>
<p id="instruccion">Apuntá al botín rojo de la lámina</p>
<div id="status">buscando...</div>

<script>
const RED_CONFIG = {
  rMin: 150, rMax: 255,
  gMax: 80,  bMax: 80,
  minPixels: 300,
  confirmFrames: 8
};

let detecting = false;
let sequencePlaying = false;
let confirmCount = 0;
let audioCtx = null;

const videoCamara = document.getElementById('video-camara');
const canvasD     = document.getElementById('canvas-detect');
const videoExp    = document.getElementById('video-experience');
const status      = document.getElementById('status');
const startBtn    = document.getElementById('start-btn');
const indicator   = document.getElementById('detector-indicator');
const pulseRing   = document.getElementById('pulse-ring');

canvasD.width = 160;
canvasD.height = 120;

startBtn.addEventListener('click', async () => {
  startBtn.classList.add('hidden');
  document.getElementById('instruccion').classList.add('hidden');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    videoCamara.srcObject = stream;
    await videoCamara.play();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    detecting = true;
    detect();
  } catch(e) {
    status.textContent = 'Error al acceder a la cámara';
    status.style.opacity = '1';
  }
});

function detect() {
  if (sequencePlaying) { requestAnimationFrame(detect); return; }

  const ctxD = canvasD.getContext('2d', { willReadFrequently: true });
  ctxD.drawImage(videoCamara, 0, 0, 160, 120);
  const data = ctxD.getImageData(0, 0, 160, 120).data;

  let redPixels = 0;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (r >= RED_CONFIG.rMin && g <= RED_CONFIG.gMax && b <= RED_CONFIG.bMax && r > g * 2.2 && r > b * 2.2) {
      redPixels++;
    }
  }

  if (redPixels > RED_CONFIG.minPixels) {
    confirmCount++;
    indicator.classList.add('active');
    if (confirmCount >= RED_CONFIG.confirmFrames) {
      sequencePlaying = true;
      disparar();
      return;
    }
  } else {
    confirmCount = Math.max(0, confirmCount - 1);
    if (confirmCount === 0) indicator.classList.remove('active');
  }

  requestAnimationFrame(detect);
}

function disparar() {
  status.style.opacity = '0';
  indicator.classList.remove('active');

  // Sonido de pulso
  if (audioCtx) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  }

  // Pulso visual
  pulseRing.style.transition = 'none';
  pulseRing.style.transform = 'translate(-50%, -50%) scale(0)';
  pulseRing.style.opacity = '1';
  requestAnimationFrame(() => {
    pulseRing.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';
    pulseRing.style.transform = 'translate(-50%, -50%) scale(5)';
    pulseRing.style.opacity = '0';
  });

  setTimeout(mostrarVideo, 600);
}

function mostrarVideo() {
  videoExp.classList.add('visible');
  videoExp.currentTime = 0;
  videoExp.play();
  videoExp.onended = ocultarVideo;
}

function ocultarVideo() {
  videoExp.classList.remove('visible');
  setTimeout(() => {
    videoExp.pause();
    videoExp.currentTime = 0;
    confirmCount = 0;
    sequencePlaying = false;
    status.textContent = 'buscando...';
    status.style.opacity = '0.5';
    detect();
  }, 900);
}

setInterval(() => {
  if (detecting && !sequencePlaying) {
    status.style.opacity = status.style.opacity === '0' ? '0.5' : '0';
  }
}, 900);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Pibe que Ataja el Tiempo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Georgia', serif;
    width: 100vw;
    height: 100vh;
  }

  #video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #canvas-detect {
    display: none;
  }

  #canvas-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  #status {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 10;
    transition: opacity 1s;
    text-align: center;
  }

  #frase {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: clamp(22px, 6vw, 42px);
    font-style: italic;
    letter-spacing: 2px;
    text-align: center;
    z-index: 10;
    opacity: 0;
    line-height: 1.4;
    text-shadow: 0 0 40px rgba(255,80,80,0.8), 0 2px 8px rgba(0,0,0,0.9);
    pointer-events: none;
    width: 80%;
  }

  #pulse-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 80px; height: 80px;
    border: 3px solid rgba(255, 60, 60, 0.8);
    border-radius: 50%;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
  }

  #start-btn {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 18px 40px;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 20;
    font-family: 'Georgia', serif;
    transition: all 0.3s;
  }

  #start-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.8);
  }

  #instruccion {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
    text-align: center;
  }

  #detector-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    z-index: 10;
    transition: background 0.3s;
  }

  #detector-indicator.active {
    background: #ff3333;
    box-shadow: 0 0 12px #ff3333;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-detect"></canvas>
<canvas id="canvas-overlay"></canvas>

<div id="detector-indicator"></div>

<button id="start-btn">Iniciar experiencia</button>
<p id="instruccion">Apuntá al botín rojo de la lámina</p>

<div id="status">buscando...</div>
<div id="frase">El pibe que ataja el tiempo</div>
<div id="pulse-ring"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const RED_CONFIG = {
  rMin: 150, rMax: 255,
  gMin: 0,   gMax: 80,
  bMin: 0,   bMax: 80,
  minPixels: 300,        // mínimo de píxeles rojos para disparar
  confirmFrames: 8       // frames consecutivos confirmando antes de disparar
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let stream = null;
let animFrame = null;
let detecting = false;
let sequencePlaying = false;
let confirmCount = 0;
let audioCtx = null;

// ─── ELEMENTOS ────────────────────────────────────────────────────────────────
const video       = document.getElementById('video');
const canvasD     = document.getElementById('canvas-detect');
const canvasO     = document.getElementById('canvas-overlay');
const ctxO        = canvasO.getContext('2d');
const status      = document.getElementById('status');
const frase       = document.getElementById('frase');
const pulseRing   = document.getElementById('pulse-ring');
const startBtn    = document.getElementById('start-btn');
const indicator   = document.getElementById('detector-indicator');

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  canvasO.width  = window.innerWidth;
  canvasO.height = window.innerHeight;
  canvasD.width  = 160;
  canvasD.height = 120;
}
window.addEventListener('resize', resize);
resize();

// ─── START CAMERA ─────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.classList.add('hidden');
  document.getElementById('instruccion').classList.add('hidden');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    detecting = true;
    status.style.opacity = '1';
    initAudio();
    detect();
  } catch(e) {
    status.textContent = 'Error al acceder a la cámara';
    status.style.opacity = '1';
  }
});

// ─── DETECCIÓN DE COLOR ───────────────────────────────────────────────────────
function detect() {
  if (!detecting || sequencePlaying) {
    animFrame = requestAnimationFrame(detect);
    return;
  }

  const ctxD = canvasD.getContext('2d', { willReadFrequently: true });
  ctxD.drawImage(video, 0, 0, canvasD.width, canvasD.height);
  const imageData = ctxD.getImageData(0, 0, canvasD.width, canvasD.height);
  const data = imageData.data;

  let redPixels = 0;
  let sumX = 0, sumY = 0;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (
      r >= RED_CONFIG.rMin && r <= RED_CONFIG.rMax &&
      g >= RED_CONFIG.gMin && g <= RED_CONFIG.gMax &&
      b >= RED_CONFIG.bMin && b <= RED_CONFIG.bMax &&
      r > g * 2.2 && r > b * 2.2
    ) {
      redPixels++;
      const px = (i / 4) % canvasD.width;
      const py = Math.floor((i / 4) / canvasD.width);
      sumX += px; sumY += py;
    }
  }

  if (redPixels > RED_CONFIG.minPixels) {
    confirmCount++;
    indicator.classList.add('active');

    const cx = (sumX / redPixels) / canvasD.width;
    const cy = (sumY / redPixels) / canvasD.height;

    if (confirmCount >= RED_CONFIG.confirmFrames) {
      detecting = false;
      sequencePlaying = true;
      confirmar(cx * window.innerWidth, cy * window.innerHeight);
      return;
    }
  } else {
    confirmCount = Math.max(0, confirmCount - 1);
    if (confirmCount === 0) indicator.classList.remove('active');
  }

  animFrame = requestAnimationFrame(detect);
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playPulseSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function playStadiumSound() {
  if (!audioCtx) return;
  // Ruido de estadio: noise filtrado
  const bufferSize = audioCtx.sampleRate * 4;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.15;

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 0.5;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 1.5);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4);

  source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  source.start(); source.stop(audioCtx.currentTime + 4);
}

function playImpactSound() {
  if (!audioCtx) return;
  // Impacto del guante
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dist = audioCtx.createWaveShaper();

  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 400) * x / (Math.PI + 400 * Math.abs(x));
  }
  dist.curve = curve;

  osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// ─── SECUENCIA PRINCIPAL ──────────────────────────────────────────────────────
function confirmar(cx, cy) {
  status.style.opacity = '0';
  playPulseSound();

  // Paso 1: pulso de confirmación
  animatePulse(cx, cy);

  // Paso 2 (1s): ondas empiezan
  setTimeout(() => {
    playStadiumSound();
    startWaves(cx, cy);
  }, 1000);

  // Paso 3 (5s): impacto
  setTimeout(() => {
    playImpactSound();
    explosion(cx, cy);
  }, 5000);

  // Paso 4 (6.5s): frase aparece
  setTimeout(() => {
    mostrarFrase();
  }, 6500);

  // Paso 5 (11s): todo se desvanece, vuelve a detectar
  setTimeout(() => {
    fadeOut();
  }, 11000);

  setTimeout(() => {
    resetExperience();
  }, 13000);
}

// ─── ANIMACIONES ──────────────────────────────────────────────────────────────
let waves = [];
let particles = [];
let animating = false;

function startWaves(cx, cy) {
  waves = [];
  animating = true;
  renderLoop(cx, cy);
}

function renderLoop(cx, cy) {
  if (!animating) return;

  // Agregar nueva onda cada ~400ms
  if (Math.random() < 0.04) {
    waves.push({ x: cx, y: cy, r: 10, maxR: Math.min(window.innerWidth, window.innerHeight) * 0.7, alpha: 0.8, speed: 2.5 + Math.random() * 2 });
  }

  ctxO.clearRect(0, 0, canvasO.width, canvasO.height);

  // Dibujar ondas
  waves = waves.filter(w => w.alpha > 0.01);
  waves.forEach(w => {
    ctxO.beginPath();
    ctxO.arc(w.x, w.y, w.r, 0, Math.PI * 2);
    ctxO.strokeStyle = `rgba(255, 200, 60, ${w.alpha})`;
    ctxO.lineWidth = 2;
    ctxO.stroke();

    // Segunda onda interna fragmentada
    if (w.r > 30) {
      ctxO.beginPath();
      ctxO.setLineDash([12, 8]);
      ctxO.arc(w.x, w.y, w.r * 0.7, 0, Math.PI * 2);
      ctxO.strokeStyle = `rgba(255, 160, 60, ${w.alpha * 0.5})`;
      ctxO.lineWidth = 1;
      ctxO.stroke();
      ctxO.setLineDash([]);
    }

    w.r += w.speed;
    w.alpha -= 0.008;
  });

  // Dibujar partículas de explosión
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctxO.beginPath();
    ctxO.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctxO.fillStyle = `rgba(${p.color}, ${p.life})`;
    ctxO.fill();
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.3;
    p.life -= 0.018;
    p.size *= 0.97;
  });

  requestAnimationFrame(() => renderLoop(cx, cy));
}

function explosion(cx, cy) {
  // Crear partículas de impacto
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 12;
    const colors = ['255, 200, 60', '255, 255, 120', '255, 100, 60', '255, 255, 255'];
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      size: 2 + Math.random() * 6,
      life: 0.8 + Math.random() * 0.4,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }

  // Flash blanco
  ctxO.fillStyle = 'rgba(255,255,255,0.35)';
  ctxO.fillRect(0, 0, canvasO.width, canvasO.height);
}

function animatePulse(cx, cy) {
  pulseRing.style.left = cx + 'px';
  pulseRing.style.top = cy + 'px';
  pulseRing.style.transform = 'translate(-50%, -50%) scale(0)';
  pulseRing.style.opacity = '1';
  pulseRing.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';

  requestAnimationFrame(() => {
    pulseRing.style.transform = 'translate(-50%, -50%) scale(4)';
    pulseRing.style.opacity = '0';
  });
}

function mostrarFrase() {
  frase.style.transition = 'opacity 2s ease';
  frase.style.opacity = '1';
}

function fadeOut() {
  frase.style.transition = 'opacity 2s ease';
  frase.style.opacity = '0';
  ctxO.globalAlpha = 1;

  let alpha = 1;
  const fade = setInterval(() => {
    alpha -= 0.05;
    if (alpha <= 0) { clearInterval(fade); ctxO.clearRect(0, 0, canvasO.width, canvasO.height); }
  }, 80);
}

function resetExperience() {
  animating = false;
  waves = [];
  particles = [];
  sequencePlaying = false;
  confirmCount = 0;
  indicator.classList.remove('active');
  status.textContent = 'buscando...';
  status.style.opacity = '1';
  detecting = true;
  detect();
}

// ─── STATUS PULSANTE ──────────────────────────────────────────────────────────
setInterval(() => {
  if (detecting && !sequencePlaying) {
    status.style.opacity = status.style.opacity === '0' ? '0.5' : '0';
  }
}, 900);
</script>
</body>
</html>
